<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>meyizAi | Gemma 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #111114; --accent: #6366f1; --text: #fff; --dim: #94a3b8; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        .sidebar { width: 260px; background: var(--card); border-right: 1px solid #222; padding: 25px; display: flex; flex-direction: column; }
        .logo { font-family: 'Syne'; font-size: 26px; background: linear-gradient(45deg, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
        .model-badge { font-size: 11px; color: var(--dim); background: rgba(99,102,241,0.12); border: 1px solid rgba(99,102,241,0.25); padding: 3px 8px; border-radius: 20px; display: inline-block; }
        .main { flex: 1; display: flex; flex-direction: column; background: radial-gradient(circle at top right, #16161d, transparent); }
        #chat-box { flex: 1; overflow-y: auto; padding: 40px 15%; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 85%; padding: 15px 20px; border-radius: 18px; line-height: 1.6; font-size: 15px; animation: fadeIn 0.3s ease; white-space: pre-wrap; word-break: break-word; }
        .user { align-self: flex-end; background: var(--accent); border-bottom-right-radius: 4px; }
        .ai { align-self: flex-start; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-bottom-left-radius: 4px; }
        .thinking-block { font-size: 13px; color: var(--dim); font-style: italic; border-left: 2px solid #333; padding-left: 10px; margin-bottom: 8px; }
        .ai.streaming::after { content: '▋'; animation: blink 0.7s steps(1) infinite; margin-left: 2px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        .input-area { padding: 30px 15%; }
        .input-container { background: rgba(255,255,255,0.03); border: 1px solid #333; border-radius: 15px; padding: 10px; display: flex; backdrop-filter: blur(10px); }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }
        button { background: var(--accent); border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; transition: opacity 0.2s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">meyizAi</div>
        <span class="model-badge">Gemma 4 31B</span>
    </div>
    <div class="main">
        <div id="chat-box">
            <div class="msg ai">Selam! Ben meyizAi. Google Gemma 4 31B motoruyla çalışıyorum. Ne yapalım?</div>
        </div>
        <div class="input-area">
            <div class="input-container">
                <input type="text" id="userInput" placeholder="Mesajını yaz..." onkeypress="if(event.key==='Enter') send()">
                <button id="sendBtn" onclick="send()">Gönder</button>
            </div>
        </div>
    </div>

    <script>
        const PROXY = "http://localhost:8080/chat";
        const history = [];

        async function send() {
            const input = document.getElementById('userInput');
            const box = document.getElementById('chat-box');
            const btn = document.getElementById('sendBtn');
            const text = input.value.trim();
            if (!text) return;

            appendMsg('user', text);
            input.value = '';
            btn.disabled = true;

            history.push({ role: "user", content: text });

            const aiMsg = document.createElement('div');
            aiMsg.className = 'msg ai streaming';
            box.appendChild(aiMsg);

            const thinkDiv = document.createElement('div');
            thinkDiv.className = 'thinking-block';
            thinkDiv.style.display = 'none';
            aiMsg.appendChild(thinkDiv);

            const replySpan = document.createElement('span');
            aiMsg.appendChild(replySpan);

            box.scrollTop = box.scrollHeight;

            try {
                const response = await fetch(PROXY, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages: history })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let fullReply = '';
                let thinkText = '';
                let inThink = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        const trimmed = line.trim();
                        if (!trimmed.startsWith('data: ') || trimmed === 'data: [DONE]') continue;
                        try {
                            const json = JSON.parse(trimmed.slice(6));
                            const delta = json.choices?.[0]?.delta?.content ?? '';
                            if (!delta) continue;

                            let remaining = delta;
                            while (remaining.length > 0) {
                                if (inThink) {
                                    const end = remaining.indexOf('</think>');
                                    if (end !== -1) {
                                        thinkText += remaining.slice(0, end);
                                        remaining = remaining.slice(end + 8);
                                        inThink = false;
                                        thinkDiv.textContent = '💭 ' + thinkText.trim();
                                        thinkDiv.style.display = 'block';
                                    } else {
                                        thinkText += remaining;
                                        remaining = '';
                                    }
                                } else {
                                    const start = remaining.indexOf('<think>');
                                    if (start !== -1) {
                                        fullReply += remaining.slice(0, start);
                                        replySpan.textContent = fullReply;
                                        remaining = remaining.slice(start + 7);
                                        inThink = true;
                                    } else {
                                        fullReply += remaining;
                                        replySpan.textContent = fullReply;
                                        remaining = '';
                                    }
                                }
                            }
                            box.scrollTop = box.scrollHeight;
                        } catch (_) {}
                    }
                }

                aiMsg.classList.remove('streaming');
                history.push({ role: "assistant", content: fullReply });

            } catch (err) {
                aiMsg.classList.remove('streaming');
                aiMsg.textContent = 'Hata: Proxy sunucusuna bağlanılamadı. server.py çalışıyor mu? → python server.py';
            }

            btn.disabled = false;
            box.scrollTop = box.scrollHeight;
        }

        function appendMsg(role, text) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.textContent = text;
            box.appendChild(div);
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
